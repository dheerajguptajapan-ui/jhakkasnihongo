name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: jhakkas nihongo ${{ github.ref_name }}
          body: |
            ## 🧠 Jhakkas Nihongo Neural Link v1.0.0
            
            Welcome to the elite overhaul of Jhakkas Nihongo. This release includes:
            - **Modular Curriculum**: Faster loading and granular control.
            - **SM-2 SRS Engine**: Scientifically optimized memory scheduling.
            - **Neural Link UI**: Premium "Tokyo Midnight" cyberpunk aesthetics.
            - **TTS Feedback**: Instant auditory reinforcement for learning.
            
            ### 🚀 Installation
            1. Download the `app-debug.apk` attached below.
            2. Enable "Install from Unknown Sources" on your device.
            3. Open the APK and start your neural sync.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
