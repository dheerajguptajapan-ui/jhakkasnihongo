name: Build & Release Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jhakkas-nihongo-v3.0.0-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: jhakkas nihongo ${{ github.ref_name }}
          body: |
            ## 🧠 Jhakkas Nihongo Neural Link v3.0.0
            
            Welcome to the **Neural Mastery** expansion. This massive update delivers:
            - **JLPT N1-N3 Curriculum**: Complete integration of all chapters (4,000+ nodes).
            - **Hot-Furigana Toggle**: Global toggle directly on the navigation bar.
            - **Focus Mode 2.0**: Enhanced centered UI with a dedicated "Return to Dashboard" rescue button.
            - **Tokyo Midnight Performance**: Optimized for mobile devices with high-density data.
            - **TTS Feedback**: Instant auditory reinforcement for learning.
            
            ### 🚀 Installation
            1. Download the `app-debug.apk` attached below.
            2. Enable "Install from Unknown Sources" on your device.
            3. Open the APK and start your neural sync.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
